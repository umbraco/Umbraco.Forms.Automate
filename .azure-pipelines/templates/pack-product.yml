# Reusable template for packing a single product
# Uses pre-built outputs from the Build stage
#
# Parameters:
#   product: Product name (e.g., "Umbraco.Forms.Automate")
#   condition: Optional condition for all steps (default: true)

parameters:
    - name: product
      type: string
    - name: condition
      type: string
      default: "true"

steps:
    - script: dotnet tool install --global nbgv || true
      displayName: Install NBGV
      condition: ${{ parameters.condition }}

    - script: nbgv cloud
      displayName: Set version
      condition: ${{ parameters.condition }}
      workingDirectory: ${{ parameters.product }}

    - script: dotnet restore ${{ parameters.product }}/${{ parameters.product }}.slnx --configfile NuGet.CI.config -p:DisableCloudBuildNumber=true
      displayName: Restore packages
      condition: ${{ parameters.condition }}

    - script: |
          dotnet pack ${{ parameters.product }}/${{ parameters.product }}.slnx \
            --configuration Release \
            --no-build \
            --output ./artifacts/nupkg \
            -p:DisableCloudBuildNumber=true
      displayName: Pack ${{ parameters.product }} (NuGet)
      condition: ${{ parameters.condition }}
